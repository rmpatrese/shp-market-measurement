name: Preview en pull requests

on: pull_request

permissions:
  contents: read
  id-token: write

jobs:
  preview:
    # Los PRs de forks no obtienen id-token; solo ramas del propio repo
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/38422068154/locations/global/workloadIdentityPools/github/providers/github-oidc
          service_account: github-deploy@shp-market-measurement.iam.gserviceaccount.com

      - name: Deploy a canal de preview
        run: npx -y firebase-tools@latest hosting:channel:deploy "pr-${{ github.event.number }}" --expires 7d --project shp-market-measurement --non-interactive
