name: Deploy a Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

# Autenticación sin claves: Workload Identity Federation (OIDC)
permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/38422068154/locations/global/workloadIdentityPools/github/providers/github-oidc
          service_account: github-deploy@shp-market-measurement.iam.gserviceaccount.com

      - name: Deploy hosting + reglas de Firestore
        run: npx -y firebase-tools@latest deploy --only hosting,firestore --project shp-market-measurement --non-interactive --force
